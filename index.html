<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torneo Del Porcodidio</title>

<style>
body { font-family: Arial; background:#000; color:gold; text-align:center; }
h1 { color:red; }

.screen { display:none; }
.active { display:block; }

button {
  padding:15px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:gold;
  width:85%;
  font-weight:bold;
}

input { padding:10px; margin:5px; }

.card {
  border:1px solid gold;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<h1>🎰 Torneo Del Porcodidio</h1>

<!-- HOME -->
<div id="home" class="screen active">
<button id="btnNew">▶️ Nuovo Torneo</button>
<button id="btnPlayers">👥 Giocatori</button>
<button id="btnPalmares">🏆 Palmares</button>
<button id="btnGames">🎮 Giochi</button>
</div>

<!-- GIOCATORI -->
<div id="players" class="screen">
<input id="playerName">
<button id="addPlayerBtn">Aggiungi</button>
<div id="playerList"></div>
<button class="back">⬅️</button>
</div>

<!-- GIOCHI -->
<div id="games" class="screen">
<input id="gameName">
<button id="addGameBtn">Aggiungi Gioco</button>
<div id="gamesList"></div>
<button class="back">⬅️</button>
</div>

<!-- PALMARES -->
<div id="palmares" class="screen">
<div id="palmaresList"></div>
<button class="back">⬅️</button>
</div>

<!-- TORNEO -->
<div id="tournament" class="screen">
<div id="tournamentArea"></div>
<button id="finishBtn">Fine Torneo</button>
<button class="back">⬅️</button>
</div>

<script>
let players = JSON.parse(localStorage.getItem("players")||"[]");
let games = JSON.parse(localStorage.getItem("games")||["UNO","31","Saltacavallo","Fr0cio","Dubito","Las Vegas"]);
let palmares = JSON.parse(localStorage.getItem("palmares")||"[]");

let selectedPlayers=[];
let selectedGames=[];
let scores={};

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

document.getElementById("btnNew").addEventListener("click",()=>startSetup());
document.getElementById("btnPlayers").addEventListener("click",()=>{show("players");renderPlayers();});
document.getElementById("btnGames").addEventListener("click",()=>{show("games");renderGames();});
document.getElementById("btnPalmares").addEventListener("click",()=>{show("palmares");renderPalmares();});

document.querySelectorAll(".back").forEach(b=>b.addEventListener("click",()=>show("home")));

document.getElementById("addPlayerBtn").addEventListener("click",()=>{
let n=document.getElementById("playerName").value;
if(n){
players.push(n);
localStorage.setItem("players",JSON.stringify(players));
renderPlayers();
}
});

function renderPlayers(){
let d=document.getElementById("playerList");
d.innerHTML="";
players.forEach(p=>d.innerHTML+=p+"<br>");
}

document.getElementById("addGameBtn").addEventListener("click",()=>{
let g=document.getElementById("gameName").value;
if(g){
games.push(g);
localStorage.setItem("games",JSON.stringify(games));
renderGames();
}
});

function renderGames(){
let d=document.getElementById("gamesList");
d.innerHTML="";
games.forEach(g=>{
d.innerHTML+=<div class="card">${g}</div>;
});
}

function renderPalmares(){
let d=document.getElementById("palmaresList");
d.innerHTML="";
palmares.forEach((p,i)=>{
d.innerHTML+=<div class="card">Torneo ${i+1}: ${p}</div>;
});
}

function startSetup(){
show("tournament");
let area=document.getElementById("tournamentArea");
area.innerHTML="";

selectedPlayers=[...players];
selectedGames=[...games];

scores={};
selectedPlayers.forEach(p=>scores[p]=0);

selectedGames.forEach(g=>{
area.innerHTML+=<div class="card"><h3>${g}</h3>+
selectedPlayers.map(p=>${p}<input type="number" id="${g}_${p}" value="0"><br>).join("")+
</div>;
});
}

document.getElementById("finishBtn").addEventListener("click",()=>{
selectedGames.forEach(g=>{
selectedPlayers.forEach(p=>{
let val=parseInt(document.getElementById(g+"_"+p).value)||0;
scores[p]+=val;
});
});

let arr=selectedPlayers.map(p=>({name:p,score:scores[p]}));
arr.sort((a,b)=>b.score-a.score);

let winner=arr[0].name;
palmares.push(winner);
localStorage.setItem("palmares",JSON.stringify(palmares));

alert("Vincitore: "+winner);
show("home");
});
</script>

</body
